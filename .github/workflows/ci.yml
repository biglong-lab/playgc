name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + TypeScript 檢查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript 型別檢查
        run: npm run check

  test:
    name: 單元測試 + 整合測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: 執行測試
        run: npm run test:run

  build:
    name: 建置檢查
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: 建置專案
        run: npm run build
        env:
          NODE_ENV: production

  e2e:
    name: E2E 測試（黃金路徑）
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gameplatform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gameplatform_test
      NODE_ENV: test
      ENABLE_E2E_HELPERS: "true"
      # 假 secret 讓 server 能啟動（test 模式不真的用到）
      SESSION_SECRET: "e2e-test-secret-not-for-prod"
      PORT: "3333"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: 推送 DB schema
        run: npx drizzle-kit push --force
        continue-on-error: true

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install chromium --with-deps

      - name: 啟動 dev server（背景）
        run: |
          NODE_ENV=test ENABLE_E2E_HELPERS=true \
            npx tsx server/index.ts > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

      - name: 等 server 起來
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3333/api/health; then
              echo "✅ Server ready (try $i)"
              break
            fi
            echo "等 server (try $i/30)..."
            sleep 2
          done
          # 確認 health 通過
          curl -f http://localhost:3333/api/health || (cat /tmp/server.log && exit 1)

      - name: 執行 E2E 黃金路徑 + 多人元件 smoke + race condition
        run: npx playwright test --project="Desktop Chrome" --grep "黃金路徑|A2 多人元件|Host 軸線|軟分流階段 1|race condition"
        # 黃金路徑 = Phase 1 D4 接地驗證
        # A2 多人元件 = Phase 3 A2 L3 持久化驗證
        # Host 軸線 = host 元件接 admin editor smoke
        # 軟分流階段 1 = editor mode 分流 e2e
        # race condition = Phase A 樂觀鎖 / 衝突回應驗證（互動級多人 e2e）

      - name: 收集 server log（debug 用）
        if: always()
        run: |
          if [ -f /tmp/server.log ]; then
            echo "=== Server log（最後 100 行）==="
            tail -100 /tmp/server.log || true
          fi

      - name: 停止 server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: 上傳測試報告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: 上傳 server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-server-log
          path: /tmp/server.log
          retention-days: 3
