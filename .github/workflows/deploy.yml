name: Deploy

# 手動觸發部署 - 配合嚴格部署控制規則
# 指令：gh workflow run deploy.yml -f confirm=yes
# 指定方式：gh workflow run deploy.yml -f confirm=yes -f method=coolify
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '確認部署（輸入 yes）'
        required: true
        type: string
      method:
        description: '部署方式'
        required: false
        type: choice
        default: 'docker-ssh'
        options:
          - docker-ssh
          - coolify

permissions:
  contents: read

jobs:
  validate:
    name: 部署前驗證
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript 型別檢查
        run: npm run check

      - name: 執行完整測試
        run: npm run test:run

      - name: 建置專案
        run: npm run build
        env:
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

  deploy-docker-ssh:
    name: 部署（Docker SSH）
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.method == 'docker-ssh' }}
    environment: production
    steps:
      - name: 透過 SSH 部署到伺服器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/www/wwwroot/gameplatform' }}
            echo "📦 拉取最新程式碼..."
            git pull origin main
            echo "🐳 重新建置並啟動容器..."
            docker compose -f docker-compose.prod.yml up -d --build
            echo "⏳ 等待健康檢查..."
            sleep 10
            echo "🔍 檢查服務狀態..."
            curl -sf http://localhost:3333/health && echo "✅ 部署成功！" || echo "❌ 健康檢查失敗"

  deploy-coolify:
    name: 部署（Coolify Webhook）
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.method == 'coolify' }}
    environment: production
    steps:
      - name: 觸發 Coolify 部署
        run: |
          echo "🚀 觸發 Coolify webhook..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          if [ "$response" = "200" ] || [ "$response" = "201" ]; then
            echo "✅ Coolify 部署已觸發"
          else
            echo "❌ Coolify webhook 回傳 HTTP $response"
            exit 1
          fi

  rejected:
    name: 部署已拒絕
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm != 'yes' }}
    steps:
      - name: 拒絕部署
        run: |
          echo "❌ 部署已取消：confirm 參數必須為 'yes'"
          exit 1
