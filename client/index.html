<!DOCTYPE html>
<html lang="zh-TW" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- 📱 viewport-fit=cover 支援 iPhone 瀏海；允許縮放（無障礙要求）；interactive-widget 避免鍵盤推擠 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />
    <meta name="description" content="CHITO — Real-world game platform for local venues. QR, GPS, photo and target missions." />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CHITO" />
    <meta name="format-detection" content="telephone=no" />
    <meta property="og:title" content="CHITO 七逃 | 走踏在地的實境遊戲平台" />
    <meta property="og:description" content="CHITO 七逃 · 結合在地場域 × 實境玩法 × 團隊協作的沉浸式遊戲體驗" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.homi.cc/" />
    <meta property="og:image" content="https://game.homi.cc/icons/pwa-512.png" />
    <meta property="og:site_name" content="CHITO" />
    <meta property="og:locale" content="zh_TW" />
    <link rel="canonical" href="https://game.homi.cc/" />
    <meta name="author" content="大哉實業有限公司" />
    <title>CHITO 七逃 | 走踏在地的實境遊戲平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      字體家族：
      - Noto Sans TC（系統預設 / sans-serif）
      - Orbitron / Rajdhani（競技感標題）
      - Noto Serif TC（文藝主題 font-serif）
      - JetBrains Mono（科技主題 font-mono）
      - Bungee（遊戲主題 font-display，英文為主；中文 fallback 到 Noto Sans TC 900）
    -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Noto+Serif+TC:wght@400;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bungee&display=swap" rel="stylesheet">
    <!-- Leaflet 改由 MapView 透過 npm import 取得（避免 CDN 載入時序與 PWA 離線問題） -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
