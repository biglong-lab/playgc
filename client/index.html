<!DOCTYPE html>
<html lang="zh-TW" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- 📱 viewport-fit=cover 支援 iPhone 瀏海；interactive-widget 避免鍵盤推擠 -->
    <!-- 🐛 2026-07-03 CHITO critical：雙指縮放讓遊戲版面跑掉/按鈕偏移 → 禁用者縮放
         （遊戲平台互動優先；放大需求可用系統字級 + 遊戲內字級鈕）-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />

    <!-- 🆕 2026-05-13 iOS PWA Splash 多解析度（12 種裝置）—— B 任務
         由 scripts/generate-splash-screens.mjs 產生於 /icons/splash/
         iOS 啟動 PWA 時依照螢幕尺寸 media query 自動選圖 -->
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1290x2796.png"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1179x2556.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1284x2778.png"
          media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1125x2436.png"
          media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1242x2688.png"
          media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-828x1792.png"
          media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1242x2208.png"
          media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-750x1334.png"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-2048x2732.png"
          media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1668x2388.png"
          media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/icons/splash/splash-1536x2048.png"
          media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <meta name="description" content="CHITO — Real-world game platform for local venues. QR, GPS, photo and target missions." />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CHITO" />
    <meta name="format-detection" content="telephone=no" />
    <meta property="og:title" content="CHITO — Play the Place" />
    <meta property="og:description" content="CHITO — Real-world game platform for local venues. QR, GPS, photo and target missions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://game.homi.cc/" />
    <meta property="og:image" content="https://game.homi.cc/icons/pwa-512.png" />
    <meta property="og:site_name" content="CHITO" />
    <meta property="og:locale" content="zh_TW" />
    <link rel="canonical" href="https://game.homi.cc/" />
    <meta name="author" content="大哉實業有限公司" />
    <title>CHITO — Play the Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      字體家族：
      - Noto Sans TC（系統預設 / sans-serif）
      - Orbitron / Rajdhani（競技感標題）
      - Noto Serif TC（文藝主題 font-serif）
      - JetBrains Mono（科技主題 font-mono）
      - Bungee（遊戲主題 font-display，英文為主；中文 fallback 到 Noto Sans TC 900）
    -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Noto+Serif+TC:wght@400;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bungee&display=swap" rel="stylesheet">
    <!-- Leaflet 改由 MapView 透過 npm import 取得（避免 CDN 載入時序與 PWA 離線問題） -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
